<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Animated geometric flowing school webpage background">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FBFF"/>
      <stop offset="45%" stop-color="#EAF6FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>

    <linearGradient id="waveBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F6FFF"/>
      <stop offset="55%" stop-color="#00B7FF"/>
      <stop offset="100%" stop-color="#0062FF"/>
    </linearGradient>

    <linearGradient id="waveTeal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2EE6C6"/>
      <stop offset="100%" stop-color="#00AEEF"/>
    </linearGradient>

    <linearGradient id="waveYellow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFE04F"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0062FF" flood-opacity="0.16"/>
    </filter>

    <style>
      :root {
        --blue: #0F6FFF;
        --deep-blue: #0046C7;
        --teal: #22D3C5;
        --yellow: #FFC928;
        --pink: #FF4F9A;
        --purple: #7C3AED;
      }

      .float-slow { animation: floatSlow 9s ease-in-out infinite alternate; }
      .float-mid { animation: floatMid 6s ease-in-out infinite alternate; }
      .float-fast { animation: floatFast 4.8s ease-in-out infinite alternate; }

      .flow-line {
        fill: none;
        stroke: rgba(255,255,255,0.88);
        stroke-width: 7;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 90 38;
        animation: dashFlow 5.5s linear infinite;
      }

      .flow-line-secondary {
        fill: none;
        stroke: rgba(15,111,255,0.45);
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 55 34;
        animation: dashFlowReverse 7.5s linear infinite;
      }

      .orb {
        transform-box: fill-box;
        transform-origin: center;
        animation: pulse 2.6s ease-in-out infinite;
      }

      .shape-spin {
        transform-box: fill-box;
        transform-origin: center;
        animation: spin 16s linear infinite;
      }

      .dot-field circle {
        animation: twinkle 3.2s ease-in-out infinite alternate;
      }

      .dot-field circle:nth-child(2n) { animation-delay: .4s; }
      .dot-field circle:nth-child(3n) { animation-delay: .9s; }

      @keyframes dashFlow {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -256; }
      }

      @keyframes dashFlowReverse {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: 220; }
      }

      @keyframes floatSlow {
        from { transform: translate3d(-12px, -6px, 0); }
        to { transform: translate3d(18px, 10px, 0); }
      }

      @keyframes floatMid {
        from { transform: translate3d(8px, 12px, 0); }
        to { transform: translate3d(-12px, -10px, 0); }
      }

      @keyframes floatFast {
        from { transform: translate3d(-6px, 8px, 0) rotate(0deg); }
        to { transform: translate3d(10px, -8px, 0) rotate(6deg); }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: .92; }
        50% { transform: scale(1.18); opacity: 1; }
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes twinkle {
        from { opacity: .22; transform: scale(.9); }
        to { opacity: .72; transform: scale(1.08); }
      }

      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; }
      }
    </style>
  </defs>

  <rect width="1600" height="700" fill="url(#bg)"/>

  <!-- soft background blobs -->
  <path d="M-140 620 C120 500 230 700 430 560 C650 405 760 570 940 420 C1115 272 1310 305 1740 90 L1740 760 L-140 760 Z"
        fill="#DDF2FF" opacity=".72"/>
  <path d="M785 -80 C980 -60 965 140 1120 170 C1315 210 1395 90 1690 20 L1690 430 C1440 475 1260 360 1085 455 C940 533 890 410 760 480 C630 550 590 660 455 710 L215 710 C325 610 360 510 530 470 C675 435 700 335 772 240 C845 145 700 40 785 -80 Z"
        fill="#E7F5FF" opacity=".9"/>

  <!-- wide flowing geometric ribbons -->
  <g filter="url(#softShadow)">
    <path class="float-slow" d="M-120 635 C170 585 285 425 500 478 C705 528 760 300 965 332 C1160 362 1260 485 1720 200 L1720 760 L-120 760 Z"
          fill="url(#waveBlue)" opacity=".94"/>
    <path class="float-mid" d="M-120 705 C170 620 280 520 488 550 C720 584 795 385 990 402 C1190 420 1308 565 1720 360 L1720 760 L-120 760 Z"
          fill="url(#waveTeal)" opacity=".74"/>
    <path class="float-fast" d="M-120 760 C185 625 360 650 565 520 C760 396 925 478 1088 450 C1310 410 1425 308 1720 350 L1720 760 Z"
          fill="url(#waveYellow)" opacity=".92"/>
    <path class="float-mid" d="M-160 680 C125 640 280 520 465 545 C700 575 760 430 930 468 C1100 505 1210 620 1720 470 L1720 760 L-160 760 Z"
          fill="#7C3AED" opacity=".34"/>
  </g>

  <!-- animated flowing lines only, no graph/data visualizer meaning -->
  <path class="flow-line" d="M-40 635 C140 612 260 540 390 554 C565 574 655 448 805 430 C980 408 1070 500 1232 465 C1395 430 1480 315 1645 292"/>
  <path class="flow-line-secondary" d="M-60 585 C105 535 250 500 388 505 C575 512 640 358 802 366 C955 374 1040 435 1184 420 C1345 403 1450 282 1640 238"/>
  <path class="flow-line-secondary" d="M-80 685 C170 610 292 645 468 600 C655 552 718 470 892 505 C1075 542 1208 640 1642 520"/>

  <!-- abstract geometric shapes -->
  <g class="float-slow" opacity=".9">
    <circle cx="1185" cy="122" r="20" fill="#0F6FFF"/>
    <circle cx="1450" cy="515" r="28" fill="none" stroke="#22D3C5" stroke-width="8"/>
    <circle cx="1020" cy="205" r="12" fill="#FFC928"/>
    <circle cx="1320" cy="570" r="16" fill="none" stroke="#FF4F9A" stroke-width="7"/>
  </g>

  <g class="float-mid">
    <path class="shape-spin" d="M1280 55 L1322 136 L1235 126 Z" fill="none" stroke="#22D3C5" stroke-width="8" stroke-linejoin="round"/>
    <rect class="shape-spin" x="1260" y="492" width="52" height="52" rx="6" fill="none" stroke="#FFC928" stroke-width="8"/>
    <path class="shape-spin" d="M650 58 L710 88 L665 135 Z" fill="none" stroke="#CFE7FF" stroke-width="7" stroke-linejoin="round"/>
  </g>

  <g class="float-fast">
    <rect x="970" y="168" width="28" height="28" rx="5" transform="rotate(33 984 182)" fill="none" stroke="#0F6FFF" stroke-width="5"/>
    <circle cx="620" cy="395" r="17" fill="none" stroke="#CFE7FF" stroke-width="7"/>
    <circle cx="84" cy="610" r="14" fill="#00AEEF" opacity=".78"/>
  </g>

  <!-- glowing flow nodes, decorative not chart-like -->
  <g>
    <circle class="orb" cx="360" cy="572" r="17" fill="#FFFFFF" stroke="#22D3C5" stroke-width="8"/>
    <circle class="orb" cx="705" cy="505" r="17" fill="#FFFFFF" stroke="#22D3C5" stroke-width="8" style="animation-delay:.45s"/>
    <circle class="orb" cx="930" cy="378" r="17" fill="#FFFFFF" stroke="#0F6FFF" stroke-width="8" style="animation-delay:.9s"/>
    <circle class="orb" cx="1115" cy="430" r="17" fill="#FFFFFF" stroke="#00AEEF" stroke-width="8" style="animation-delay:1.3s"/>
  </g>

  <!-- dot texture -->
  <g class="dot-field" fill="#0F6FFF">
    <circle cx="65" cy="70" r="4"/><circle cx="90" cy="70" r="4"/><circle cx="115" cy="70" r="4"/><circle cx="140" cy="70" r="4"/><circle cx="165" cy="70" r="4"/>
    <circle cx="65" cy="95" r="4"/><circle cx="90" cy="95" r="4"/><circle cx="115" cy="95" r="4"/><circle cx="140" cy="95" r="4"/><circle cx="165" cy="95" r="4"/>
    <circle cx="65" cy="120" r="4"/><circle cx="90" cy="120" r="4"/><circle cx="115" cy="120" r="4"/><circle cx="140" cy="120" r="4"/><circle cx="165" cy="120" r="4"/>
  </g>

  <g class="dot-field" fill="#FFFFFF">
    <circle cx="1420" cy="570" r="4"/><circle cx="1445" cy="570" r="4"/><circle cx="1470" cy="570" r="4"/><circle cx="1495" cy="570" r="4"/><circle cx="1520" cy="570" r="4"/>
    <circle cx="1420" cy="595" r="4"/><circle cx="1445" cy="595" r="4"/><circle cx="1470" cy="595" r="4"/><circle cx="1495" cy="595" r="4"/><circle cx="1520" cy="595" r="4"/>
    <circle cx="1420" cy="620" r="4"/><circle cx="1445" cy="620" r="4"/><circle cx="1470" cy="620" r="4"/><circle cx="1495" cy="620" r="4"/><circle cx="1520" cy="620" r="4"/>
  </g>
</svg>
