<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7FBFF"/>
      <stop offset="45%" stop-color="#ECF7FF"/>
      <stop offset="100%" stop-color="#FFF7E8"/>
    </linearGradient>

    <linearGradient id="lineA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00A7FF" stop-opacity="0"/>
      <stop offset="45%" stop-color="#00A7FF" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="lineB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB000" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFB000" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#00C896" stop-opacity="0"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#7FA6C7" stroke-width="1" opacity="0.08"/>
    </pattern>

    <style>
      .flow {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 5;
        stroke-dasharray: 180 1200;
        animation: dash 16s linear infinite;
      }
      .flow.slow { animation-duration: 24s; }
      .flow.fast { animation-duration: 12s; }
      .node {
        transform-origin: center;
        animation: pulse 4.8s ease-in-out infinite;
      }
      .node.delay1 { animation-delay: .8s; }
      .node.delay2 { animation-delay: 1.6s; }
      .node.delay3 { animation-delay: 2.4s; }
      .float {
        animation: float 12s ease-in-out infinite alternate;
      }
      .float.reverse { animation-direction: alternate-reverse; }
      .ring {
        fill: none;
        stroke-width: 3;
        stroke-dasharray: 12 18;
        animation: spin 28s linear infinite;
        transform-origin: center;
      }
      .brandText {
        font-family: Inter, Segoe UI, Arial, sans-serif;
        font-size: 42px;
        font-weight: 800;
        letter-spacing: 12px;
        fill: #112A46;
        opacity: .08;
      }
      @keyframes dash {
        from { stroke-dashoffset: 1400; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .58; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.28); }
      }
      @keyframes float {
        from { transform: translateY(-18px) translateX(-8px); }
        to { transform: translateY(22px) translateX(12px); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .flow, .node, .float, .ring { animation: none; }
      }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <g opacity="0.55" filter="url(#softGlow)">
    <circle cx="240" cy="160" r="190" fill="#00A7FF" opacity="0.10"/>
    <circle cx="1690" cy="890" r="230" fill="#FFB000" opacity="0.12"/>
    <circle cx="1510" cy="190" r="160" fill="#7C5CFF" opacity="0.10"/>
    <circle cx="420" cy="900" r="210" fill="#00C896" opacity="0.10"/>
  </g>

  <text x="960" y="570" text-anchor="middle" class="brandText">LEOS</text>

  <g class="float">
    <path class="flow slow" stroke="url(#lineA)" d="M-120 760 C 180 620, 300 690, 520 560 S 900 340, 1120 450 S 1460 760, 2040 420"/>
    <path class="flow" stroke="url(#lineB)" d="M-100 340 C 220 230, 430 360, 650 275 S 950 110, 1230 260 S 1600 520, 2020 250"/>
    <path class="flow fast" stroke="url(#lineA)" opacity="0.72" d="M-160 940 C 160 880, 360 760, 610 805 S 940 960, 1210 820 S 1580 540, 2060 710"/>
  </g>

  <g class="float reverse" opacity="0.95">
    <path class="flow slow" stroke="url(#lineB)" d="M-80 535 C 260 420, 520 500, 760 430 S 1090 230, 1360 390 S 1610 660, 2020 560"/>
    <path class="flow" stroke="url(#lineA)" opacity="0.65" d="M-140 170 C 160 250, 330 120, 580 190 S 890 400, 1130 315 S 1480 40, 2060 120"/>
  </g>

  <g opacity="0.82">
    <circle class="node" cx="275" cy="340" r="8" fill="#00A7FF"/>
    <circle class="node delay1" cx="640" cy="275" r="9" fill="#FFB000"/>
    <circle class="node delay2" cx="1120" cy="450" r="8" fill="#7C5CFF"/>
    <circle class="node delay3" cx="1515" cy="640" r="9" fill="#00C896"/>
    <circle class="node delay1" cx="430" cy="805" r="7" fill="#00C896"/>
    <circle class="node delay2" cx="1230" cy="820" r="8" fill="#FFB000"/>
  </g>

  <g opacity="0.42">
    <polygon class="float" points="142,160 184,184 142,208 100,184" fill="none" stroke="#00A7FF" stroke-width="4"/>
    <rect class="float reverse" x="1510" y="150" width="86" height="86" rx="18" fill="none" stroke="#7C5CFF" stroke-width="4"/>
    <polygon class="float" points="1655,815 1718,925 1592,925" fill="none" stroke="#FFB000" stroke-width="4"/>
    <rect class="float reverse" x="350" y="820" width="118" height="118" rx="26" fill="none" stroke="#00C896" stroke-width="4" transform="rotate(12 409 879)"/>
  </g>

  <g opacity="0.25">
    <circle class="ring" cx="960" cy="540" r="330" stroke="#112A46"/>
    <circle class="ring" cx="960" cy="540" r="455" stroke="#00A7FF" style="animation-duration:36s"/>
  </g>

  <g opacity="0.14">
    <path d="M0 990 L1920 880 L1920 1080 L0 1080 Z" fill="#112A46"/>
  </g>
</svg>
