# HCW-SMS (HCW School Management System) — local Podman stack (Apache/PHP + MariaDB)
#
#   podman compose up -d --build
#   open http://localhost:8080/   (redirects into the installer)
#
# Installer "Database Connection" step values:
#   Host/Server : db
#   Port        : 3306
#   Username    : hcwsms
#   Password    : hcwsms_pw
#   Database    : hcwsms   (choose "Remove data from existing database")
services:
  db:
    image: docker.io/library/mariadb:10.11
    container_name: hcwsms-db
    restart: unless-stopped
    # HCW-SMS (openSIS) uses '0000-00-00' dates and creates triggers/procedures/
    # events, so loosen sql_mode and pre-enable the globals the app expects.
    command:
      - --sql-mode=NO_ENGINE_SUBSTITUTION
      - --log-bin-trust-function-creators=1
      - --event-scheduler=ON
    environment:
      MARIADB_ROOT_PASSWORD: hcwsms_root_pw
      MARIADB_DATABASE: hcwsms
      MARIADB_USER: hcwsms
      MARIADB_PASSWORD: hcwsms_pw
    volumes:
      - hcwsms-db-data:/var/lib/mysql
      - ./podman/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

  web:
    build:
      context: .
      dockerfile: Containerfile
    image: hcwsms-web:latest
    container_name: hcwsms-web
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html

volumes:
  hcwsms-db-data:
